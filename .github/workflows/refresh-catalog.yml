name: refresh-catalog
# KOBIC 신간·표지 자동 갱신 → 재빌드 → 커밋 (당신 PC 없이 클라우드에서)
# ⚠️ 모바일 repo는 이제 독자 수확하지 않는다 — 데이터는 PC repo의 brain(🧠)이 매 사이클 동기.
#    (이중 수확=알라딘 쿼터 낭비+데이터 분기 방지) 수동 실행만 남김.
on:
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: refresh-catalog
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 전체 파이프라인 (수확→정제→중복정리→보강→검수→색인→빌드)
        run: node tools/pipeline.js --pages=${{ github.event.schedule == '0 20 * * 1' && '30' || '8' }} --aladin-limit=1500
        # 알라딘 일 5,000 한도 → 회당 1,500(하루 2회=3,000, 월요일 +주간 1회=4,500 < 5,000)
        env:
          ALADIN_TTBKEY: ${{ secrets.ALADIN_TTBKEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          GOOGLE_BOOKS_KEY: ${{ secrets.GOOGLE_BOOKS_KEY }}

      - name: 변경분 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: KOBIC 신간·표지 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
        # ↑ 이 push가 legacy(branch) Pages를 자동 배포한다. 별도 deploy-pages 잡은
        #   깃허브 내장 pages-build-deployment와 같은 github-pages 환경을 두고 경쟁 →
        #   "in progress deployment" 400 실패 → 소유자 이메일 알림 스팸. 그래서 제거함.
        #   (모바일 Pages build_type=legacy이므로 배포는 push만으로 충분.)
